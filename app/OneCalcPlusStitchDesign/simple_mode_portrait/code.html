<body class="flex flex-col h-screen max-w-md mx-auto relative">

<header class="bg-[#0e0e10] flex items-center justify-between px-6 py-4 w-full fixed top-0 z-50">
<button class="text-[#6ffb85] hover:bg-[#1f1f22] transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>

</div>
</section>

<section class="grid grid-cols-4 gap-2 mb-4">
<!-- Row 1 -->
<button class="h-16 flex items-center justify-center bg-surface-container-high rounded-md hover:bg-surface-bright active:scale-95 transition-all">

</button>
<button class="h-16 flex items-center justify-center bg-surface-container-high rounded-md hover:bg-surface-bright active:scale-95 transition-all">
<span class="material-symbols-outlined text-tertiary" data-icon="percent">percent</span>
</button>
<button class="h-16 flex items-center justify-center bg-surface-container-high rounded-md hover:bg-surface-bright active:scale-95 transition-all">
<span class="material-symbols-outlined text-tertiary" data-icon="backspace">backspace</span>
</button>
<button class="h-16 flex items-center justify-center bg-surface-container-high rounded-md hover:bg-surface-bright active:scale-95 transition-all">

</button>

<button class="h-20 flex items-center justify-center bg-surface-container-high rounded-md hover:bg-surface-bright active:scale-95 transition-all">
<span class="font-headline text-2xl font-medium">0</span>
</button>
<button class="h-20 flex items-center justify-center bg-surface-container-high rounded-md hover:bg-surface-bright active:scale-95 transition-all">
<span class="font-headline text-2xl font-bold">.</span>

<div class="flex flex-col gap-6 text-on-surface-variant">
